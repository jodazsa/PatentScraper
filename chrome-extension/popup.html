<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Patent to Markdown</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      width: 260px;
      padding: 20px;
      background: #fff;
      color: #1a1a1a;
    }

    h1 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    p.subtitle {
      font-size: 11px;
      color: #666;
      margin-bottom: 16px;
    }

    button {
      width: 100%;
      padding: 9px 14px;
      background: #1a73e8;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }

    button:hover:not(:disabled) { background: #1558b0; }

    button:disabled {
      background: #a8c7fa;
      cursor: default;
    }

    #status {
      margin-top: 12px;
      font-size: 11px;
      color: #555;
      min-height: 16px;
      line-height: 1.4;
    }

    #status.error { color: #c0392b; }
    #status.success { color: #1e7e34; }
  </style>
</head>
<body>
  <h1>Patent to Markdown</h1>
  <p class="subtitle">Downloads the current patent as a single combined .md file.</p>
  <button id="download-btn">Download .md</button>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
